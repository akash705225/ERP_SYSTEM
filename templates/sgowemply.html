<!DOCTYPE html>
<html>

<head>
    <title>Show Employee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style1.css') }}">
</head>
</head>

<body>

    <header>
        <h1>HR ERP System</h1>
    </header>

    <nav>
        <ul>
            <li><a href="hrhome">Home</a></li>
            <li><a href="add_employee">Add Employee</a></li>
            <li><a href="show_employee">Show Employee</a></li>
            <li><a href="searchemployee">Search Emp</a></li>
            <li><a href="logout">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="main">

            <h2>Employee List</h2>

            <table>
                <tr>
                    <th>Empid </th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th> view</th>
                </tr>
                {%for row in data%}
                <tr>
                    <td>{{row[0]}}</td>
                    <td>{{row[1]}}</td>
                    <td>{{row[2]}}</td>
                    <td>{{row[5]}}</td>
                    <td>{{row[6]}}</td>
                    <td><a href="view_employee?id={{row[0]}}" class="btn" style="background-color: blue;">view</a></td>

                </tr>
                {%endfor%}





            </table>


        </div>

        <div class="sidebar">
            <img src="profile.png">
            <h3>Administrator</h3>
        </div>

    </div>

</body>

</html>
